# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
early_access: false

tone_instructions: "Review as a strict backend/fintech engineer. Focus on scheduler duplication, DB safety, market-data validation, and audit pollution."

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!build/**"
    - "!coverage/**"
    - "!*.bak"
    - "!**/*.bak"
    - "!**/*.bak.*"
    - "!tmp_audit_exports/**"
    - "!supabase/.temp/**"
    - "!artifacts/**"

chat:
  auto_reply: true
